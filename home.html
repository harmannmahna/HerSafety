<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>HerSafety — Home</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="app">
  <div class="greeting">
    <h2>Hello, <span id="greet-name">Friend</span> 👋</h2>
    <div class="loc" id="greet-loc">Locating…</div>
  </div>

  <div class="sos-wrap">
    <button id="sos-btn" class="sos-btn">SOS</button>
    <p class="sos-hint">Tap the button in case of emergency</p>
  </div>

  <div class="section-title">Quick Actions</div>
  <div class="actions-grid">
    <button id="audio-btn" class="action-card">
      <div class="icon">🎙</div>
      <div class="name">Start Audio Recording</div>
    </button>
    <button id="video-btn" class="action-card">
      <div class="icon">📹</div>
      <div class="name">Start Video Recording</div>
    </button>
    <button id="escape-btn" class="action-card">
      <div class="icon">📞</div>
      <div class="name">Smart Escape Call</div>
    </button>
    <button id="voice-btn" class="action-card">
      <div class="icon">🎤</div>
      <div class="name">Voice Activation</div>
    </button>
  </div>

  <div id="escape-choices" class="card" style="display:none;">
    <div style="font-weight:600; font-size:14px;">Fake call duration</div>
    <div class="choices">
      <button data-escape="10">10s</button>
      <button data-escape="15">15s</button>
      <button data-escape="20">20s</button>
    </div>
  </div>

  <video id="video-preview" class="preview" playsinline></video>
</div>

<!-- SOS overlay -->
<div id="sos-overlay" class="overlay">
  <div class="pulse-circle">🚨</div>
  <h2>Emergency alert activated</h2>
  <ul class="status-list">
    <li>Sharing your location with emergency contacts</li>
    <li>Dialling emergency number 112 (simulated)</li>
    <li>Audio recording in progress</li>
  </ul>
  <button id="cancel-sos" class="btn" style="background:white; color:#e11d48;">Cancel Alert</button>
</div>

<!-- Bottom Nav -->
<nav class="bottom-nav">
  <a class="nav-item active" href="home.html"><span class="nav-icon">🏠</span>Home</a>
  <a class="nav-item" href="map.html"><span class="nav-icon">🗺</span>Map</a>
  <a class="nav-item" href="contacts.html"><span class="nav-icon">📇</span>Contacts</a>
  <a class="nav-item" href="profile.html"><span class="nav-icon">👤</span>Profile</a>
</nav>

<script src="script.js"></script>
<script>initHome();</script>
</body>
</html>
